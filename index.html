<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ClearCatalyst</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f9fbfd;
    }
    h1 {
      font-size: 3em;
      color: #1e3a5f;
    }
    p {
      font-size: 1.2em;
      color: #555;
    }
    form {
      margin-top: 30px;
    }
    input, textarea {
      padding: 10px;
      width: 250px;
      margin: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>ClearCatalyst</h1>
  <p>College admissions guidance, simplified.</p>
  <h2>🚀 Coming Soon</h2>

  <form name="interest" method="POST" data-netlify="true">
    <input type="text" name="name" placeholder="Your Name" required /><br />
    <input type="email" name="email" placeholder="Your Email" required /><br />
    <textarea name="message" placeholder="What do you need help with?"></textarea><br />
    <button type="submit">Notify Me</button>
  </form>
</body>
</html>
